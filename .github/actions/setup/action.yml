name: Setup
description: Install tools and dependencies
runs:
  using: composite
  steps:
    - uses: jdx/mise-action@v4
      with:
        version: 2026.4.10

    - uses: actions/cache@v5
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - run: npm ci
      shell: bash
